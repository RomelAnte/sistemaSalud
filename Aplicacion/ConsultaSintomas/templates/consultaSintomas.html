{% extends "plantilla.html" %} {% block body %}
<div class="formulario">
  <h1>🩺 Consulta de Síntomas</h1>
  <p style="text-align: center; color: #666; margin-bottom: 30px">
    Selecciona los síntomas que experimentas
  </p>

  <form method="post" id="formularioRegister">
    {% csrf_token %}

    <div class="form-check form-switch">
      <div class="row align-items-center">
        <div class="col-md-10">
          <label class="form-check-label" for="tiene_fiebre"
            >¿Tienes fiebre?</label
          >
        </div>
        <div class="col-md-2">
          <input
            class="form-check-input"
            type="checkbox"
            name="tiene_fiebre"
            id="tiene_fiebre"
          />
        </div>
      </div>
    </div>

    <div class="form-check form-switch">
      <div class="row align-items-center">
        <div class="col-md-10">
          <label class="form-check-label" for="tiene_tos">¿Tienes tos?</label>
        </div>
        <div class="col-md-2">
          <input
            class="form-check-input"
            type="checkbox"
            name="tiene_tos"
            id="tiene_tos"
          />
        </div>
      </div>
    </div>

    <div class="form-check form-switch">
      <div class="row align-items-center">
        <div class="col-md-10">
          <label class="form-check-label" for="tiene_congestion_nasal"
            >¿Tienes congestión nasal?</label
          >
        </div>
        <div class="col-md-2">
          <input
            class="form-check-input"
            type="checkbox"
            name="tiene_congestion_nasal"
            id="tiene_congestion_nasal"
          />
        </div>
      </div>
    </div>

    <div class="form-check form-switch">
      <div class="row align-items-center">
        <div class="col-md-10">
          <label class="form-check-label" for="tiene_dolor_de_garganta"
            >¿Tienes dolor de garganta?</label
          >
        </div>
        <div class="col-md-2">
          <input
            class="form-check-input"
            type="checkbox"
            name="tiene_dolor_de_garganta"
            id="tiene_dolor_de_garganta"
          />
        </div>
      </div>
    </div>

    <div class="form-check form-switch">
      <div class="row align-items-center">
        <div class="col-md-10">
          <label class="form-check-label" for="tiene_erupciones"
            >¿Tienes erupciones?</label
          >
        </div>
        <div class="col-md-2">
          <input
            class="form-check-input"
            type="checkbox"
            name="tiene_erupciones"
            id="tiene_erupciones"
          />
        </div>
      </div>
    </div>

    <div class="form-check form-switch">
      <div class="row align-items-center">
        <div class="col-md-10">
          <label class="form-check-label" for="tiene_dolor_de_cabeza"
            >¿Tienes dolor de cabeza?</label
          >
        </div>
        <div class="col-md-2">
          <input
            class="form-check-input"
            type="checkbox"
            name="tiene_dolor_de_cabeza"
            id="tiene_dolor_de_cabeza"
          />
        </div>
      </div>
    </div>

    <div class="content-button">
      <button type="submit" class="btn btn-enviar">
        Consultar Diagnóstico
      </button>
    </div>
  </form>
</div>

<div id="resultado"></div>
{% endblock body %}
